<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas mondial</title>
</head>

<body>
    <header>
        <h1>Atlas mondial</h1>
        <p>Bienvenue sur l'Atlas mondial, votre ressource pour explorer les pays du monde entier.</p>
    </header>

    <main>

        <section class=recherche>
            <form>
                <label for="pays">Rechercher un pays :</label>
            <input type="text" id="pays" placeholder="Entrez le nom d'un pays" aria-describedby="message-erreur">
            <p id="message-erreur"></p>
            <button type="submit">Effectuer la recherche</button>
            </form>
        </section>

        <section class="resultats">
            <p>Rechercher un pays pour afficher les informations.</p>
        </section>

    </main>

    <footer>
        &copy; 2026 Atlas mondial
    </footer>

</body>
</html>
