<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas mondial</title>
    <link rel="stylesheet" href="/CSS/style.css">
</head>

<body>
    <header>
        <h1>Atlas mondial</h1>
        <p>Bienvenue sur l'Atlas mondial, votre ressource pour explorer les pays du monde entier.</p>
    </header>

    <main>

        <section class="recherche">
            <form id="form-recherche">
                <label for="pays">Rechercher un pays :</label>
            <input type="text" id="pays" placeholder="Entrez le nom d'un pays" aria-describedby="message-erreur">
            <p id="message-erreur"></p>
            <button type="submit">Rechercher</button>
            </form>
        </section>
            <p id="message-chargement" class="message-chargement hidden">Recherche en cours...</p>
        <section id="resultats" class="resultats">
            <p>Rechercher un pays pour afficher les informations.</p>
        </section>

    </main>

    <footer>
        &copy; 2026 Atlas mondial
    </footer>

    <script src="/JS/app.js"></script>
</body>
</html>
